spring:
  datasource:
    url: jdbc:mysql://localhost:3306/product_db?useUnicode=yes&characterEncoding=UTF-8&useSSL=false&createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 12345
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: product-service-group
      auto-offset-reset: earliest
      # 1. Bọc bộ ErrorHandlingDeserializer ở lớp ngoài cùng
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        # 2. Định nghĩa bộ giải mã thực tế chạy bên trong
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        # 3. CHÌA KHÓA VÀNG: Ép buộc không đọc Header package của order-service gửi sang
        spring.json.use.type.headers: false

        # 4. Chỉ định chính xác Class Event đích tại product-service để ép kiểu
        spring.json.value.default.type: "com.shoes.product.dto.event.OrderPlacedEvent"
        spring.json.trusted.packages: "*"

    # 5. CHẶN VÒNG LẶP VÔ HẠN: Cấu hình listener chỉ retry tối đa 1 lần nếu có lỗi, lỗi tiếp sẽ bỏ qua
    listener:
      back-off:
        interval: 0
        max-attempts: 1
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info