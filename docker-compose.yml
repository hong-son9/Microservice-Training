
networks:
  shoes-network:
    driver: bridge
services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - shoes-network

  redis:
    image: redis:7.2-alpine
    container_name: shoes-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - shoes-network

  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"
      - "5005:5005"
    networks:
      - shoes-network

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
      - "5006:5005"
    depends_on:
      discovery-server:
        condition: service_started
    networks:
      - shoes-network

  product-service:
    build: ./product-service
    ports:
      - "8082:8082"
      - "5007:5005"
    depends_on:
      discovery-server:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shoes-network

  order-service:
    build: ./order-service
    ports:
      - "5008:5005"
      - "8083:8083"
    depends_on:
      discovery-server:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shoes-network

  identity-service:
    build: ./identity-service
    ports:
      - "5009:5005"
      - "8081:8081"
    depends_on:
      discovery-server:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shoes-network

  cart-service:
    build: ./cart-service
    ports:
      - "5010:5005"
      - "8084:8083"
    depends_on:
      discovery-server:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shoes-network

  promotion-service:
    build: ./promotion-service
    ports:
      - "5011:5005"
      - "8085:8082"
    depends_on:
      discovery-server:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shoes-network
volumes:
  redis_data: