services:

  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"
      - "5005:5005"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
      - "5006:5005"
    depends_on:
      - discovery-server

  product-service:
    build: ./product-service
    ports:
      - "8082:8082"
      - "5007:5005"
    depends_on:
      - discovery-server
    extra_hosts:
      - "host.docker.internal:host-gateway"

  order-service:
    build: ./order-service
    ports:
      - "5008:5005"
      - "8083:8083"
    depends_on:
      - discovery-server
    extra_hosts:
      - "host.docker.internal:host-gateway"

  identity-service:
    build: ./identity-service
    ports:
      - "5009:5005"
      - "8081:8081"
    depends_on:
      - discovery-server
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cart-service:
    build: ./cart-service
    ports:
      - "5010:5005"
      - "8084:8083"
    depends_on:
      - discovery-server
    extra_hosts:
      - "host.docker.internal:host-gateway"

  promotion-service:
    build: ./promotion-service
    ports:
      - "5011:5005"
      - "8085:8082"
    depends_on:
      - discovery-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
